name: ci

on:
  push:
    branches: [main]
    tags: ["*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

env:
  DOTNET_VERSION: |
    8.0.x
    10.0.x
  TARGET_FRAMEWORKS: "net8.0 net10.0"
  CONFIGURATION: "Release"
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    services:
      sqlserver:
        image: mcr.microsoft.com/mssql/server:2025-latest
        env:
          ACCEPT_EULA: Y
          SA_PASSWORD: "YourStrong@Passw0rd123"
          MSSQL_PID: Developer
        ports:
          - 1433:1433
        options: >-
          --health-cmd "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P YourStrong@Passw0rd123 -Q 'SELECT 1' -C"
          --health-interval 10s
          --health-timeout 3s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          cache: true
          cache-dependency-path: '**/packages.lock.json'

      - name: Restore dependencies
        run: dotnet restore --locked-mode

      - name: Format check
        run: dotnet format --verify-no-changes --verbosity normal

      - name: Build
        run: dotnet build --configuration ${{ env.CONFIGURATION }} --no-restore

      - name: Install sqlcmd (mssql-tools18)
        run: |
          source /etc/os-release
          curl -fsSL "https://packages.microsoft.com/config/ubuntu/${VERSION_ID}/packages-microsoft-prod.deb" -o packages-microsoft-prod.deb
          sudo dpkg -i packages-microsoft-prod.deb
          rm packages-microsoft-prod.deb
          sudo apt-get update
          sudo ACCEPT_EULA=Y apt-get install -y mssql-tools18 unixodbc-dev
          echo "/opt/mssql-tools18/bin" >> $GITHUB_PATH

      - name: Initialize test database
        run: |
          sqlcmd \
            -S localhost,1433 \
            -U sa \
            -P YourStrong@Passw0rd123 \
            -d master \
            -Q "IF DB_ID(N'McpMssqlTest') IS NULL CREATE DATABASE [McpMssqlTest];" \
            -C

      - name: Test
        env:
          MCPMSSQL_CONNECTION_STRING: "Server=localhost,1433;Database=master;User Id=sa;Password=YourStrong@Passw0rd123;TrustServerCertificate=True;Encrypt=True;Initial Catalog=McpMssqlTest"
        # Run each target framework sequentially. The suite shares a single
        # SQL Server database that the fixtures drop and recreate on init, so
        # running the net8.0 and net10.0 test modules in parallel would race
        # on that shared database.
        run: |
          for framework in ${{ env.TARGET_FRAMEWORKS }}; do
            dotnet test --framework "$framework" --configuration ${{ env.CONFIGURATION }} --no-build --verbosity normal -- --coverage --coverage-output-format cobertura
          done

      - name: ReportGenerator
        uses: danielpalme/ReportGenerator-GitHub-Action@5.5.10
        with:
          reports: '**/*.cobertura.xml'
          targetdir: 'coveragereport'
          reporttypes: 'HtmlInline;TextSummary;MarkdownSummaryGithub'

      - name: Upload coverage report
        uses: actions/upload-artifact@v6
        with:
          name: CoverageReport
          path: coveragereport

      - name: Add coverage to job summary
        run: cat coveragereport/SummaryGithub.md >> $GITHUB_STEP_SUMMARY

      - name: Pack NuGet package for release
        run: dotnet pack --configuration ${{ env.CONFIGURATION }} --no-build --output ./artifacts

      - name: Upload release package artifact
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v6
        with:
          name: nuget-packages
          path: ./artifacts/*.nupkg

  publish:
    name: Publish release
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: nuget
      url: https://www.nuget.org/packages/Alyio.McpMssql/${{ github.ref_name }}
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout release source
        uses: actions/checkout@v6

      - name: Setup .NET for release
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Download release package artifact
        uses: actions/download-artifact@v7
        with:
          name: nuget-packages
          path: ./artifacts

      - name: Publish release package to NuGet
        run: dotnet nuget push ./artifacts/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate

      - name: Wait for NuGet release indexing
        env:
          PACKAGE_ID: Alyio.McpMssql
          PACKAGE_VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          package_id="$(echo "$PACKAGE_ID" | tr '[:upper:]' '[:lower:]')"
          url="https://api.nuget.org/v3-flatcontainer/${package_id}/index.json"

          for attempt in {1..60}; do
            echo "Checking NuGet for ${PACKAGE_ID} ${PACKAGE_VERSION} (${attempt}/60)..."

            if curl -fsSL "$url" | python3 -c 'import json, os, sys; versions = json.load(sys.stdin).get("versions", []); sys.exit(0 if os.environ["PACKAGE_VERSION"].lower() in versions else 1)'; then
              echo "NuGet package is indexed."
              exit 0
            fi

            sleep 10
          done

          echo "Timed out waiting for NuGet package indexing."
          exit 1

      # MCP Registry (see https://modelcontextprotocol.io/registry/github-actions)
      - name: Install MCP Registry release publisher
        run: |
          curl -fsSL "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher

      - name: Authenticate MCP Registry release publisher
        run: ./mcp-publisher login github-oidc

      - name: Publish release to MCP Registry
        run: ./mcp-publisher publish
